<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Giffeur - Galerie</title>
    <link rel="stylesheet" href="gallery.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>
            <img src="icons/icon48.png" width="24" height="24" style="border-radius:6px;">
            Galerie
        </h1>
        <div class="header-actions">
            <span id="count-label">0 enregistrements</span>
            <button id="btn-clear-all" class="danger">Tout supprimer</button>
        </div>
    </header>
    <div id="gallery-grid"></div>
    <div id="empty-state" style="display:none;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
        </svg>
        <p>Aucun enregistrement</p>
        <p class="sub">Les enregistrements apparaîtront ici</p>
    </div>
    <script src="gallery.js"></script>
</body>

</html>
